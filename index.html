    const POINTS_PER_NEW_LESSON = 10;

    function loadVisitedLessons() {
      try { return JSON.parse(localStorage.getItem("nihongo_visited") || "[]"); }
      catch(e) { return []; }

      localStorage.setItem("nihongo_visited", JSON.stringify(arr));
    }

    }

    function getLevel(points) {
      return Math.floor(points / POINTS_PER_LEVEL) + 1;
    }
    // بتتنادى مرة واحدة عند فتح التطبيق، بترجع رقم الـ streak المحدّث
    function updateStreakOnLoad() {
      const today = new Date().toDateString();
      const lastVisit = localStorage.getItem("nihongo_last_visit");
      let streak = parseInt(localStorage.getItem("nihongo_streak") || "0", 10);

      if (lastVisit === today) {
        return streak || 1;
      }

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);

      if (lastVisit === yesterday.toDateString()) {
        streak += 1;
      } else {
        streak = 1;
      }

      localStorage.setItem("nihongo_streak", String(streak));
      localStorage.setItem("nihongo_last_visit", today);
      return streak;
    }

    function SpeakBtn({text, color, small}) {
      const [speaking, setSpeaking] = React.useState(false);

      const fallbackSpeak = (text) => {
        setSpeaking(true);
        setTimeout(() => setSpeaking(false), 2000);

        // طريقة 1: Android App Inventor
        try {
          if (window.AppInventor) {
            window.AppInventor.setWebViewString(text);
            return;
          }
        } catch(err) {}

        // طريقة 2: Web Speech API (للاب)
        if (!window.speechSynthesis) { setSpeaking(false); return; }
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "ja-JP";
        utter.rate = 0.85;
        utter.pitch = 1.1;
        const trySpeak = () => {
          const voices = window.speechSynthesis.getVoices();
          const jaVoice = voices.find(v => v.lang && v.lang.startsWith("ja"));
          if (jaVoice) utter.voice = jaVoice;
          utter.onend = () => setSpeaking(false);
          window.speechSynthesis.speak(utter);
        };
        window.speechSynthesis.getVoices().length > 0 ? trySpeak() : (window.speechSynthesis.onvoiceschanged = trySpeak);
      };

      const handleSpeak = (e) => {
        e.stopPropagation();
        setSpeaking(true);

        // طريقة 0 (جديدة): ملف صوت مسجّل مسبقًا
        const audioPath = AUDIO_MAP[text];
        if (audioPath) {
          const audio = new Audio(audioPath);
          audio.onended = () => setSpeaking(false);
          audio.onerror = () => { setSpeaking(false); fallbackSpeak(text); };
          audio.play().catch(() => { setSpeaking(false); fallbackSpeak(text); });
          return;
        }

        fallbackSpeak(text);
      };

      const size = small ? 26 : 32;
      return (
        <button onClick={handleSpeak}
          style={{
            width:size, height:size, borderRadius:"50%",
            border:`2px solid ${color||"#e91e8c"}88`,
            background: speaking ? (color||"#e91e8c") : "rgba(255,255,255,0.85)",
            color: speaking ? "#fff" : (color||"#e91e8c"),
            fontSize: small ? 12 : 14,
            cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
            transition:"all 0.2s", flexShrink:0,
            boxShadow: speaking ? `0 2px 8px ${color||"#e91e8c"}55` : "none",
          }}>
          {speaking ? "🔊" : "🔈"}
        </button>
      );
    }

              style={{position:"fixed",inset:0,background:"rgba(30,10,50,0.45)",backdropFilter:"blur(4px)",
                zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
              <div style={{background:theme.modalBg,borderRadius:"24px 24px 0 0",
                width:"100%",maxWidth:700,height:"80vh",display:"flex",flexDirection:"column",
                boxShadow:"0 -8px 40px rgba(124,58,237,0.18)",border:`2px solid ${theme.cardBorder}`,borderBottom:"none",overflow:"hidden",transition:"background 0.3s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",
  background:"linear-gradient(135deg,#7C3AED,#A855F7)",color:"#fff",fontWeight:900,fontSize:17,direction:"rtl",flexShrink:0}}>
                  <span>🤖 المساعد الذكي</span>
                  <button onClick={()=>setShowAI(false)}
                    style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,fontWeight:700}}>✕</button>
                </div>
                <div style={{flex:1,overflowY:"auto",padding:"16px 14px",display:"flex",flexDirection:"column"}}>
                  {aiMessages.map((m,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-start":"flex-end",marginBottom:10}}>
                      <div style={{maxWidth:"82%",padding:"10px 14px",
                        borderRadius:m.role==="user"?"18px 18px 18px 4px":"18px 18px 4px 18px",
                        background:m.role==="user"?"linear-gradient(135deg,#7C3AED,#A855F7)":theme.bubbleAssistantBg,
                        color:m.role==="user"?"#fff":theme.bubbleAssistantText,fontSize:14,lineHeight:1.7,
                        boxShadow:"0 2px 8px rgba(0,0,0,0.10)",
                        border:m.role==="assistant"?theme.bubbleAssistantBorder:"none",
                        whiteSpace:"pre-wrap",textAlign:"right",direction:"rtl",fontFamily:"'Tajawal',sans-serif"}}>
                        {m.text}
                      </div>
                    </div>
                  ))}
                  {aiLoading && (
                    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
                      <div style={{background:"#fff",border:"1px solid #e8d5f0",borderRadius:"18px 18px 4px 18px",
                        padding:"10px 18px",fontSize:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>💬</div>
                    </div>
                  )}
                </div>
                <div style={{display:"flex",gap:8,padding:"12px 14px 16px",borderTop:`1px solid ${theme.cardBorder}`,background:theme.cardBg,direction:"rtl",flexShrink:0}}>
                  <button onClick={sendAIMessage} disabled={aiLoading||!aiInput.trim()}
                    style={{background:"linear-gradient(135deg,#7C3AED,#A855F7)",border:"none",borderRadius:12,
                      color:"#fff",padding:"10px 18px",fontWeight:700,fontSize:14,cursor:"pointer",
                      fontFamily:"'Tajawal',sans-serif",whiteSpace:"nowrap",
                      opacity:aiLoading||!aiInput.trim()?0.5:1}}>إرسال</button>
                  <input value={aiInput} onChange={e=>setAiInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&sendAIMessage()}
                    placeholder="اكتب سؤالك عن اليابانية..."
                    dir="rtl"
                    style={{flex:1,border:theme.inputBorder,borderRadius:12,padding:"10px 14px",
                      fontSize:14,fontFamily:"'Tajawal',sans-serif",outline:"none",
                      background:theme.inputBg,color:theme.inputText,direction:"rtl"}}/>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
